name: Deploy Web
on:
  push:
    branches:
      - main
      - pre-release
      - feature/web
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve deployment branch
        id: deployment-branch
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            feature/web)
              echo "name=feature-web" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "name=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
              ;;
          esac

      - name: Build static site
        run: bun run build

      - name: Deploy to Cloudflare Pages
        run: bunx wrangler pages deploy out/ --project-name vrchat-worlds-manager-web --branch "${{ steps.deployment-branch.outputs.name }}"
